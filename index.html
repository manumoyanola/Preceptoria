<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#0a0f1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Preceptoria"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <title>Preceptoria</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0f1a;color:#f1f5f9;font-family:sans-serif}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
  </style>
</head>
<body>
<div id="root"><p style="color:#6b7280;padding:20px;text-align:center">Cargando...</p></div>
<script src="react.js"></script>
<script src="react-dom.js"></script>
<script src="app.js"></script>
<script>
try {
  var r = window.ReactDOM.createRoot(document.getElementById('root'));
  r.render(window.React.createElement(window.__App));
} catch(err) {
  document.getElementById('root').innerHTML='<p style="color:red;padding:20px">Error: '+err.message+'</p>';
  console.error(err);
}
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
