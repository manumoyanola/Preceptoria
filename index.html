const UMBRAL_ALERTA = 15;

// EF se justifica si el turno principal del mismo día es J
function efEsJustificada(turno) { return turno === "J"; }

// ── STORAGE ───────────────────────────────────────────────────────
const sk  = (div, yr) => `asist_${div}_${yr}`;
function loadData(div, yr)   { try { const v = localStorage.getItem(sk(div,yr));  return v ? JSON.parse(v) : {}; } catch (e2) { return {}; } }
function saveData(div, yr, d){ try { localStorage.setItem(sk(div,yr), JSON.stringify(d)); } catch (e3) {} }
function loadDivs()          { try { const v = localStorage.getItem("divisiones"); return v ? JSON.parse(v) : DIVISIONES_INIT; } catch (e4) { return DIVISIONES_INIT; } }
function saveDivs(d)         { try { localStorage.setItem("divisiones", JSON.stringify(d)); } catch (e5) {} }
function loadArchivo(div)    { try { const v = localStorage.getItem(`archivo_${div}`); return v ? JSON.parse(v) : []; } catch (e6) { return []; } }
function saveArchivo(div, d) { try { localStorage.setItem(`archivo_${div}`, JSON.stringify(d)); } catch (e7) {} }
function loadFeriados(yr)    { try { const v = localStorage.getItem(`feriados_${yr}`); return v ? JSON.parse(v) : {}; } catch (e8) { return {}; } }
function saveFeriados(yr, d) { try { localStorage.setItem(`feriados_${yr}`, JSON.stringify(d)); } catch (e9) {} }

// ── HELPERS ───────────────────────────────────────────────────────
function diasEnMes(m, y) { return new Date(y, m+1, 0).getDate(); }
function hoy() { const d = new Date(); return { dia:d.getDate(), mes:d.getMonth(), anio:d.getFullYear() }; }
function kT(m,d,id)  { return `${m}_${d}_${id}`; }
function kEF(m,d,id) { return `ef_${m}_${d}_${id}`; }
function kF(m,d)     { return `${m}_${d}`; }          // feriado key
function diaSemana(anio, mes, dia) { return new Date(anio, mes, dia).getDay(); } // 0=dom, 6=sab
function esFinde(anio, mes, dia)   { const dow = diaSemana(anio,mes,dia); return dow===0||dow===6; }

function calcStats(alumnos, data, anio) {
  return alumnos.map(al => {
    let injust=0, just=0, efInj=0, efJus=0;
    for (let m=0; m<12; m++) {
      for (let d=1; d<=diasEnMes(m,anio); d++) {
        const turno = data[kT(m,d,al.id)] || "";
        const tieneEF = !!data[kEF(m,d,al.id)];
        if (turno==="A") injust+=1;
        else if (turno==="T") injust+=0.5;
        else if (turno==="J") just+=1;
        if (tieneEF) { if (efEsJustificada(turno)) efJus+=0.5; else efInj+=0.5; }
      }
    }
    const totalInasist = injust + efInj;
    return { ...al, injust, just, efInj, efJus, totalInasist, enRiesgo: totalInasist >= UMBRAL_ALERTA };
  });
}

function calcDayStats(alumnos, data, m, d) {
  let P=0,A=0,T=0,J=0,EF=0;
  let VP=0,VA=0,totalV=0, MP=0,MA=0,totalM=0;
  alumnos.forEach(al => {
    const v = data[kT(m,d,al.id)] || "";
    if (v==="P") P++; else if (v==="A") A++; else if (v==="T") T++; else if (v==="J") J++;
    if (data[kEF(m,d,al.id)]) EF++;
    // Por género
    if (al.sexo==="M") {
      totalV++;
      if (v==="P"||v==="T") VP++; else if (v==="A"||v==="J") VA++;
    } else {
      totalM++;
      if (v==="P"||v==="T") MP++; else if (v==="A"||v==="J") MA++;
    }
  });
  // Presencia física: en la escuela = P+T / fuera = A+J
  const enEscuela = P+T;
  const fueraEscuela = A+J;
  return { P,A,T,J,EF, VP,VA,totalV, MP,MA,totalM, enEscuela,fueraEscuela };
}

// ── CUMPLEAÑOS ───────────────────────────────────────────────────
function esCumple(nacimiento, dia, mes) {
  if (!nacimiento) return false;
  const [y, m, d] = nacimiento.split("-").map(Number);
  return d === dia && (m - 1) === mes;
}
function edadHoy(nacimiento, anio) {
  if (!nacimiento) return null;
  const [y] = nacimiento.split("-").map(Number);
  return anio - y;
}

function detectarSexo(nombre) {
  const primero = nombre.trim().split(/\s+/)[0].toUpperCase();
  if (NOMBRES_F.has(primero)) return "F";
  if (NOMBRES_M.has(primero)) return "M";
  return "?"; // dudoso
}

function parsearListado(texto) {
  return texto.split("\n")
    .map(l => l.trim())
    .filter(l => l.length > 2)
    .map(l => {
      // Remove leading number: "1. ", "1) ", "1 - " etc
      l = l.replace(/^\d+[.)\-\s]+/, "").trim();
      const coma = l.indexOf(",");
      let apellido, nombre;
      if (coma !== -1) {
        apellido = l.slice(0, coma).trim().toUpperCase();
        nombre   = l.slice(coma + 1).trim().toUpperCase();
      } else {
        // fallback: first word = apellido
        const parts = l.split(/\s+/);
        apellido = parts[0].toUpperCase();
        nombre   = parts.slice(1).join(" ").toUpperCase();
      }
      const sexo = detectarSexo(nombre);
      return { apellido, nombre, sexo };
    })
    .filter(a => a.apellido && a.nombre);
}

  const alumnos = divs[divActual] || [];
  const [archivo, setArchivo] = useState(() => loadArchivo(Object.keys(loadDivs())[0]));

  useEffect(() => { setArchivo(loadArchivo(divActual)); }, [divActual]);

  function darDeBaja(al) {
    const fechaBaja = new Date().toLocaleDateString("es-AR");
    // Remove from active list
    const activos = alumnos.filter(a => a.id !== al.id);
    const ndDivs = {...divs, [divActual]: activos};
    setDivs(ndDivs); saveDivs(ndDivs);
    // Add to archive
    const ndArchivo = [...archivo, {...al, fechaBaja}];
    setArchivo(ndArchivo); saveArchivo(divActual, ndArchivo);
    setModalAl(null);
  }

  function reincorporar(al) {
    // Remove fechaBaja and add back to active list
    const { fechaBaja, ...alActivo } = al;
    const activos = [...alumnos, alActivo];
    const ndDivs = {...divs, [divActual]: activos};
    setDivs(ndDivs); saveDivs(ndDivs);
    // Remove from archive
    const ndArchivo = archivo.filter(a => a.id !== al.id);
    setArchivo(ndArchivo); saveArchivo(divActual, ndArchivo);
  }

  useEffect(() => { setData(loadData(divActual, anio)); }, [divActual, anio]);

  const [feriados, setFeriados] = useState(() => loadFeriados(hoy().anio));

  function toggleFeriado(m, d) {
    const key = kF(m,d);
    const nd = {...feriados};
    if (nd[key]) delete nd[key]; else nd[key] = true;
    setFeriados(nd); saveFeriados(anio, nd);
  }

  const persist = useCallback((nd) => { setData(nd); saveData(divActual, anio, nd); }, [divActual, anio]);

  function setEstado(alId, m, d, estado) {
    const key = kT(m,d,alId); const nd = {...data};
    if (!estado || nd[key]===estado) delete nd[key]; else nd[key]=estado;
    persist(nd);
  }
  function toggleEF(alId, m, d) {
    const key = kEF(m,d,alId); const nd = {...data};
    if (nd[key]) delete nd[key]; else nd[key]=true;
    persist(nd);
  }

  const alStats  = calcStats(alumnos, data, anio);
  const enRiesgo = alStats.filter(a => a.enRiesgo);
  const dayStats = calcDayStats(alumnos, data, mes, dia);
  const diasDelMes = diasEnMes(mes, anio);

  function crearDiv() {
    if (!newDivNombre.trim()) return;
    const nd = {...divs, [newDivNombre.trim()]: []};
    setDivs(nd); saveDivs(nd); setDivActual(newDivNombre.trim());
    setNewDivNombre(""); setShowNewDiv(false);
  }
  function renombrarDiv() {
    const nuevo = editDivNombre.trim();
    if (!nuevo || nuevo === divActual) { setShowEditDiv(false); return; }
    // Rebuild divs object preserving order but with new key
    const entries = Object.entries(divs).map(([k,v]) => k===divActual ? [nuevo,v] : [k,v]);
    const nd = Object.fromEntries(entries);
    setDivs(nd); saveDivs(nd);
    // Migrate data and archivo to new key
    const dataActual = loadData(divActual, anio);
    saveData(nuevo, anio, dataActual);
    const archivoActual = loadArchivo(divActual);
    saveArchivo(nuevo, archivoActual);
    setDivActual(nuevo);
    setShowEditDiv(false);
  }
  function guardarAlumno() {
    if (!formAl.apellido.trim() || !formAl.nombre.trim()) return;
    const arr = [...alumnos];
    if (editId !== null) { const i=arr.findIndex(a=>a.id===editId); arr[i]={...arr[i],...formAl}; }
    else arr.push({ id: arr.reduce((mx,a)=>Math.max(mx,a.id),0)+1, ...formAl });
    const nd = {...divs, [divActual]: arr};
    setDivs(nd); saveDivs(nd); setEditId(null); setShowAddAl(false); setFormAl({apellido:"",nombre:"",sexo:"M",nacimiento:""});
  }
  function importarAlumnos(lista) {
    const arr = [...alumnos];
    let maxId = arr.reduce((mx,a)=>Math.max(mx,a.id),0);
    lista.forEach(al => {
      maxId++;
      arr.push({ id: maxId, ...al });
    });
    const nd = {...divs, [divActual]: arr};
    setDivs(nd); saveDivs(nd);
    setShowImport(false);
  }
  function eliminarAlumno(id) {
    const nd = {...divs, [divActual]: alumnos.filter(a=>a.id!==id)};

  }

function VistaConfig({ alumnos, divActual, onAdd, onEdit, onDelete, onReorder, archivo, onDarDeBaja, onReincorporar, onImport, data, anio }) {
  const [lista, setLista] = useState(alumnos);
  const [dragging, setDragging] = useState(null);      // index being dragged
  const [dragOver, setDragOver] = useState(null);      // index being hovered
  const touchDragIdx = useRef(null);
  const touchOverIdx = useRef(null);
  const itemRefs = useRef([]);

  // Sync when alumnos prop changes
  useEffect(() => { setLista(alumnos); }, [alumnos]);

  function reorder(from, to) {
    if (from === to || to === null) return;
    const arr = [...lista];
    const [moved] = arr.splice(from, 1);
    arr.splice(to, 0, moved);
    setLista(arr);
    onReorder(arr);
  }

  // ── MOUSE DRAG ──────────────────────────────────────────────────
  function onDragStart(e, i) { setDragging(i); e.dataTransfer.effectAllowed = 'move'; }
  function onDragOver(e, i)  { e.preventDefault(); setDragOver(i); }
  function onDrop(e, i)      { e.preventDefault(); reorder(dragging, i); setDragging(null); setDragOver(null); }
  function onDragEnd()       { setDragging(null); setDragOver(null); }

  // ── TOUCH DRAG ──────────────────────────────────────────────────
  function onTouchStart(e, i) {
    touchDragIdx.current = i;
    touchOverIdx.current = i;
    setDragging(i);
  }
  function onTouchMove(e) {
    e.preventDefault();
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const row = el && el.closest('[data-dragidx]');
    if (row) {
      const idx = parseInt(row.getAttribute('data-dragidx'));
      if (idx !== touchOverIdx.current) {
        touchOverIdx.current = idx;
        setDragOver(idx);
      }
    }
  }
  function onTouchEnd() {
    reorder(touchDragIdx.current, touchOverIdx.current);
    touchDragIdx.current = null;
    touchOverIdx.current = null;
    setDragging(null);
    setDragOver(null);
  }

  return (
    React.createElement('div', null
      , React.createElement('div', { style: {display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8},}
        , React.createElement('div', null

      )
      , lista.map((al,i)=>(
        React.createElement('div', { key: al.id,
          'data-dragidx': i,

          onDragStart: e=>onDragStart(e,i),

          onDrop: e=>onDrop(e,i),

        )
